<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Impostor: Conspiración</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-a: #1b1038;
      --bg-b: #05616d;
      --bg-c: #c8453f;
      --ink: #fffaf2;
      --muted: rgba(255, 250, 242, 0.74);
      --panel: rgba(18, 18, 32, 0.66);
      --panel-strong: rgba(16, 16, 28, 0.88);
      --line: rgba(255, 255, 255, 0.18);
      --accent: #ffe16a;
      --accent-2: #49efbc;
      --danger: #ff5c7a;
      --shadow: 0 22px 80px rgba(0, 0, 0, 0.34);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      background:
        linear-gradient(135deg, rgba(255, 225, 106, 0.16), transparent 34%),
        linear-gradient(225deg, rgba(73, 239, 188, 0.18), transparent 40%),
        linear-gradient(315deg, rgba(255, 92, 122, 0.18), transparent 36%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b) 50%, var(--bg-c));
      color: var(--ink);
      overflow-x: hidden;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent 88%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    }

    .screen {
      width: min(100%, 430px);
      min-height: min(760px, calc(100dvh - 36px));
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      text-align: center;
      animation: enter 280ms ease both;
    }

    .panel {
      width: 100%;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .kicker {
      margin: 0 0 10px;
      color: var(--accent-2);
      font-size: 0.8rem;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.35rem, 12vw, 4.3rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(1.75rem, 8vw, 3rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .copy {
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.48;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      min-height: 58px;
      width: 100%;
      padding: 16px 18px;
      border-radius: var(--radius);
      color: #16131d;
      background: var(--accent);
      font-weight: 900;
      font-size: 1.05rem;
      box-shadow: 0 12px 0 rgba(0, 0, 0, 0.18);
      transform: translateY(0);
      transition: transform 150ms ease, box-shadow 150ms ease, filter 150ms ease;
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.18);
      filter: brightness(0.98);
    }

    .btn.secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .number-box {
      display: grid;
      gap: 12px;
      margin: 16px 0 8px;
    }

    .name-grid {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .name-field {
      display: grid;
      gap: 6px;
      text-align: left;
    }

    .name-field label {
      color: rgba(255, 250, 242, 0.7);
      font-size: 0.78rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .name-field input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: none;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.1);
      font-size: 1rem;
      font-weight: 750;
    }

    .name-field input:focus {
      border-color: rgba(73, 239, 188, 0.82);
      box-shadow: 0 0 0 3px rgba(73, 239, 188, 0.16);
    }

    .fixed-number {
      display: grid;
      place-items: center;
      min-height: 116px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.24);
      background:
        linear-gradient(90deg, rgba(73, 239, 188, 0.22), rgba(255, 225, 106, 0.22)),
        rgba(255, 255, 255, 0.08);
      font-size: clamp(3.5rem, 23vw, 6.5rem);
      font-weight: 950;
      line-height: 1;
    }

    .player-badge {
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      min-height: 38px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid var(--line);
      color: var(--accent);
      font-weight: 900;
    }

    .secret-card {
      min-height: 310px;
      display: grid;
      place-items: center;
      padding: 24px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.24);
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04)),
        var(--panel-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), var(--shadow);
      user-select: none;
      touch-action: pan-y;
    }

    .secret-card.hidden-state {
      background:
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0 8px, transparent 8px 16px),
        var(--panel-strong);
    }

    .secret-inner {
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .lock {
      width: 72px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid var(--line);
      font-size: 2rem;
      font-weight: 950;
    }

    .hint {
      color: var(--muted);
      font-size: 0.98rem;
    }

    .secret-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .secret-word {
      max-width: 100%;
      overflow-wrap: anywhere;
      font-size: clamp(2.35rem, 13vw, 4.25rem);
      font-weight: 950;
      line-height: 0.94;
      letter-spacing: 0;
    }

    .secret-word.impostor {
      color: var(--danger);
      text-shadow: 0 0 22px rgba(255, 92, 122, 0.32);
    }

    .progress {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-top: 6px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.28);
      transition: width 220ms ease, background 220ms ease;
    }

    .dot.active {
      width: 28px;
      background: var(--accent-2);
    }

    .timer {
      --progress: 0deg;
      display: grid;
      place-items: center;
      width: min(78vw, 260px);
      aspect-ratio: 1;
      margin: 8px auto 4px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(18, 18, 32, 0.92) 0 59%, transparent 60%),
        conic-gradient(var(--accent-2) var(--progress), rgba(255, 255, 255, 0.15) 0),
        linear-gradient(rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03)),
        rgba(0, 0, 0, 0.16);
      color: var(--accent);
      font-size: clamp(3.2rem, 18vw, 5.6rem);
      font-weight: 950;
      line-height: 1;
    }

    .timer.done {
      color: var(--danger);
    }

    .small {
      color: rgba(255, 250, 242, 0.64);
      font-size: 0.88rem;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-height: 680px) {
      .screen {
        gap: 12px;
        min-height: calc(100dvh - 28px);
      }

      .panel {
        padding: 18px;
      }

      .secret-card {
        min-height: 250px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app" aria-live="polite"></main>

  <script>
    const PLAYERS = 5;
    const WORDS = [
      "Illuminati",
      "Reptiliano",
      "Área 51",
      "Control mental",
      "Simulación",
      "Señal",
      "Experimento",
      "Gobierno",
      "Alienígena",
      "Conspiración",
      "Vigilancia",
      "Mensaje oculto"
    ];

    const DEBATE_SECONDS = 120;
    const SESSION_KEY = "impostor-conspiracion-session";
    const app = document.querySelector("#app");
    const savedSession = loadSession();

    const state = {
      screen: "home",
      playerIndex: 0,
      impostorIndex: 0,
      word: "",
      revealed: false,
      touchStartY: null,
      names: savedSession.names,
      impostorCounts: savedSession.impostorCounts,
      impostorCycleCounts: savedSession.impostorCycleCounts,
      recentImpostors: savedSession.recentImpostors,
      usedWordIndexes: savedSession.usedWordIndexes,
      lastImpostorIndex: savedSession.lastImpostorIndex,
      roundsPlayed: savedSession.roundsPlayed,
      timerId: null,
      timerSecondsLeft: DEBATE_SECONDS
    };

    function pickRandomIndex(length) {
      return Math.floor(Math.random() * length);
    }

    function loadSession() {
      const fallback = {
        names: defaultNames(),
        impostorCounts: Array(PLAYERS).fill(0),
        impostorCycleCounts: Array(PLAYERS).fill(0),
        recentImpostors: [],
        usedWordIndexes: [],
        lastImpostorIndex: null,
        roundsPlayed: 0
      };

      try {
        const raw = window.sessionStorage.getItem(SESSION_KEY);
        if (!raw) return fallback;

        const parsed = JSON.parse(raw);
        return {
          names: normalizeNames(parsed.names),
          impostorCounts: normalizeCounts(parsed.impostorCounts),
          impostorCycleCounts: normalizeCounts(parsed.impostorCycleCounts),
          recentImpostors: normalizeRecentImpostors(parsed.recentImpostors),
          usedWordIndexes: normalizeWordIndexes(parsed.usedWordIndexes),
          lastImpostorIndex: Number.isInteger(parsed.lastImpostorIndex) && parsed.lastImpostorIndex >= 0 && parsed.lastImpostorIndex < PLAYERS
            ? parsed.lastImpostorIndex
            : null,
          roundsPlayed: Number.isInteger(parsed.roundsPlayed) ? parsed.roundsPlayed : 0
        };
      } catch {
        return fallback;
      }
    }

    function saveSession() {
      try {
        window.sessionStorage.setItem(SESSION_KEY, JSON.stringify({
          names: state.names,
          impostorCounts: state.impostorCounts,
          impostorCycleCounts: state.impostorCycleCounts,
          recentImpostors: state.recentImpostors,
          usedWordIndexes: state.usedWordIndexes,
          lastImpostorIndex: state.lastImpostorIndex,
          roundsPlayed: state.roundsPlayed
        }));
      } catch {
        // El juego sigue funcionando aunque el navegador bloquee sessionStorage.
      }
    }

    function defaultNames() {
      return Array.from({ length: PLAYERS }, (_, index) => `Jugador ${index + 1}`);
    }

    function normalizeNames(names) {
      const defaults = defaultNames();
      if (!Array.isArray(names)) return defaults;

      return defaults.map((fallback, index) => {
        const name = String(names[index] || "").trim();
        return name || fallback;
      });
    }

    function normalizeCounts(counts) {
      if (!Array.isArray(counts)) return Array(PLAYERS).fill(0);

      return Array.from({ length: PLAYERS }, (_, index) => {
        const count = Number(counts[index]);
        return Number.isFinite(count) && count > 0 ? Math.floor(count) : 0;
      });
    }

    function normalizeRecentImpostors(recentImpostors) {
      if (!Array.isArray(recentImpostors)) return [];

      return recentImpostors
        .filter((index) => Number.isInteger(index) && index >= 0 && index < PLAYERS)
        .slice(0, 3);
    }

    function normalizeWordIndexes(wordIndexes) {
      if (!Array.isArray(wordIndexes)) return [];

      return wordIndexes
        .filter((index) => Number.isInteger(index) && index >= 0 && index < WORDS.length)
        .filter((value, index, list) => list.indexOf(value) === index);
    }

    function playerName(index = state.playerIndex) {
      return state.names[index] || `Jugador ${index + 1}`;
    }

    function saveNamesFromForm() {
      const inputs = app.querySelectorAll("[data-player-name]");
      if (!inputs.length) return;

      state.names = Array.from({ length: PLAYERS }, (_, index) => {
        const value = inputs[index] ? inputs[index].value.trim() : "";
        return value || `Jugador ${index + 1}`;
      });
      saveSession();
    }

    function getAvailableWordIndexes() {
      return WORDS
        .map((_, index) => index)
        .filter((index) => !state.usedWordIndexes.includes(index));
    }

    function pickUnusedWord() {
      const available = getAvailableWordIndexes();
      if (!available.length) return null;

      const wordIndex = available[pickRandomIndex(available.length)];
      state.usedWordIndexes.push(wordIndex);
      return WORDS[wordIndex];
    }

    function resetFullGame() {
      saveNamesFromForm();
      state.playerIndex = 0;
      state.impostorIndex = 0;
      state.word = "";
      state.revealed = false;
      state.impostorCounts = Array(PLAYERS).fill(0);
      state.impostorCycleCounts = Array(PLAYERS).fill(0);
      state.recentImpostors = [];
      state.usedWordIndexes = [];
      state.lastImpostorIndex = null;
      state.roundsPlayed = 0;
      saveSession();
      showSetup();
    }

    function pickImpostorIndex() {
      resetCompletedCycle();

      const maxTotalCount = Math.max(...state.impostorCounts);
      const minTotalCount = Math.min(...state.impostorCounts);
      const missingThisCycle = state.impostorCycleCounts.filter((count) => count === 0).length;
      const closingCycle = missingThisCycle <= 2;
      const weights = state.impostorCounts.map((count, index) => {
        const hasPlayedThisCycle = state.impostorCycleCounts[index] > 0;
        const cycleWeight = hasPlayedThisCycle ? (closingCycle ? 1.15 : 0.65) : 12;
        const totalDebtBonus = hasPlayedThisCycle || !closingCycle ? Math.pow(1.55, maxTotalCount - count) : 1;
        const overusePenalty = count > minTotalCount ? 1 / (1 + ((count - minTotalCount) * 0.65)) : 1.12;
        const recentPenalty = getRecentPenalty(index);

        return Math.max(0.2, cycleWeight * totalDebtBonus * overusePenalty * recentPenalty);
      });

      return pickWeightedIndex(weights);
    }

    function resetCompletedCycle() {
      if (state.impostorCycleCounts.every((count) => count > 0)) {
        state.impostorCycleCounts = Array(PLAYERS).fill(0);
      }
    }

    function getRecentPenalty(index) {
      if (state.recentImpostors[0] === index) return 0.15;
      if (state.recentImpostors[1] === index) return 0.5;
      if (state.recentImpostors[2] === index) return 0.85;
      return 1;
    }

    function pickWeightedIndex(weights) {
      const total = weights.reduce((sum, weight) => sum + weight, 0);
      let roll = Math.random() * total;

      for (let index = 0; index < weights.length; index += 1) {
        roll -= weights[index];
        if (roll <= 0) return index;
      }

      return weights.length - 1;
    }

    function beginRound() {
      saveNamesFromForm();
      const word = pickUnusedWord();

      if (!word) {
        saveSession();
        showGameOver();
        return;
      }

      state.playerIndex = 0;
      state.impostorIndex = pickImpostorIndex();
      state.word = word;
      state.revealed = false;
      state.roundsPlayed += 1;
      state.impostorCounts[state.impostorIndex] += 1;
      state.impostorCycleCounts[state.impostorIndex] += 1;
      state.recentImpostors = [state.impostorIndex, ...state.recentImpostors]
        .filter((value, index, list) => list.indexOf(value) === index)
        .slice(0, 3);
      state.lastImpostorIndex = state.impostorIndex;
      saveSession();
      showHandoff();
    }

    function dots() {
      return Array.from({ length: PLAYERS }, (_, index) => {
        const active = index === state.playerIndex ? " active" : "";
        return `<span class="dot${active}" aria-hidden="true"></span>`;
      }).join("");
    }

    function render(html) {
      clearDebateTimer();
      app.innerHTML = html;
    }

    function showHome() {
      state.screen = "home";
      render(`
        <section class="screen">
          <div class="panel">
            <p class="kicker">Party game</p>
            <h1>Impostor</h1>
            <p class="copy" style="margin-top: 16px;">
              Conspiración, secretos y una persona que tendrá que improvisar.
            </p>
            <div class="actions">
              <button class="btn" type="button" data-action="setup">Iniciar juego</button>
            </div>
          </div>
        </section>
      `);
    }

    function showSetup() {
      state.screen = "setup";
      const remainingWords = getAvailableWordIndexes().length;
      const nameFields = state.names.map((name, index) => `
        <div class="name-field">
          <label for="player-${index + 1}">Jugador ${index + 1}</label>
          <input
            id="player-${index + 1}"
            data-player-name
            maxlength="18"
            autocomplete="off"
            value="${escapeAttribute(name)}"
            placeholder="Jugador ${index + 1}">
        </div>
      `).join("");

      render(`
        <section class="screen">
          <div class="panel">
            <p class="kicker">Configuración</p>
            <h2>Número de jugadores</h2>
            <div class="number-box" aria-label="Número de jugadores fijo">
              <div class="fixed-number">5</div>
              <p class="copy">Agrega los nombres para que cada turno sea claro. Quedan ${remainingWords} palabras.</p>
            </div>
            <div class="name-grid">
              ${nameFields}
            </div>
            <div class="actions">
              ${remainingWords > 0
                ? `<button class="btn" type="button" data-action="begin">Continuar</button>`
                : `<button class="btn" type="button" data-action="game-over">Ver fin del juego</button>`}
              <button class="btn secondary" type="button" data-action="home">Volver</button>
            </div>
          </div>
        </section>
      `);
    }

    function showHandoff() {
      state.screen = "handoff";
      state.revealed = false;
      const name = escapeHtml(playerName());
      render(`
        <section class="screen">
          <div class="player-badge">${name} · ${state.playerIndex + 1}/${PLAYERS}</div>
          <div class="panel">
            <p class="kicker">Turno privado</p>
            <h2>Pasa el teléfono a ${name}</h2>
            <p class="copy" style="margin-top: 14px;">
              La pantalla se limpiará antes de revelar el rol.
            </p>
            <div class="actions">
              <button class="btn" type="button" data-action="secret">Continuar</button>
            </div>
          </div>
          <div class="progress">${dots()}</div>
        </section>
      `);
    }

    function showSecret() {
      state.screen = "secret";
      const cardClass = state.revealed ? "secret-card" : "secret-card hidden-state";
      const secretHtml = state.revealed ? getSecretHtml() : getHiddenHtml();
      const nextText = state.playerIndex === PLAYERS - 1 ? "Finalizar reparto" : "Pasar al siguiente jugador";
      const name = escapeHtml(playerName());

      render(`
        <section class="screen">
          <div class="player-badge">${name}</div>
          <div class="${cardClass}" data-swipe-area>
            ${secretHtml}
          </div>
          <div class="actions">
            ${state.revealed
              ? `<button class="btn" type="button" data-action="next">${nextText}</button>`
              : `<button class="btn" type="button" data-action="reveal">Revelar</button>`}
          </div>
          <p class="small">${state.revealed ? "Oculta la pantalla antes de entregar el teléfono." : "También puedes deslizar hacia arriba para revelar."}</p>
          <div class="progress">${dots()}</div>
        </section>
      `);
    }

    function getHiddenHtml() {
      return `
        <div class="secret-inner">
          <div class="lock" aria-hidden="true">?</div>
          <p class="secret-label">Información oculta</p>
          <p class="hint">Toca revelar cuando solo tú estés mirando.</p>
        </div>
      `;
    }

    function getSecretHtml() {
      const isImpostor = state.playerIndex === state.impostorIndex;
      const text = isImpostor ? "IMPOSTOR" : escapeHtml(state.word);
      const label = isImpostor ? "Tu rol" : "Palabra secreta";
      const className = isImpostor ? "secret-word impostor" : "secret-word";

      return `
        <div class="secret-inner">
          <p class="secret-label">${label}</p>
          <p class="${className}">${text}</p>
        </div>
      `;
    }

    function nextPlayer() {
      app.innerHTML = "";
      state.revealed = false;

      if (state.playerIndex >= PLAYERS - 1) {
        showFinal();
        return;
      }

      state.playerIndex += 1;
      window.setTimeout(showHandoff, 120);
    }

    function showFinal() {
      state.screen = "final";
      state.timerSecondsLeft = DEBATE_SECONDS;
      const remainingWords = getAvailableWordIndexes().length;
      render(`
        <section class="screen">
          <div class="panel">
            <p class="kicker">Todos listos</p>
            <h2>Comienza el debate</h2>
            <div class="timer" data-timer>2:00</div>
            <p class="copy" data-timer-copy>Todos listos. Comienza el debate (2 minutos)</p>
            <div class="actions">
              ${remainingWords > 0
                ? `<button class="btn" type="button" data-action="setup">Nueva ronda</button>`
                : `<button class="btn" type="button" data-action="game-over">Finalizar juego</button>`}
            </div>
          </div>
        </section>
      `);
      startDebateTimer();
    }

    function showGameOver() {
      state.screen = "game-over";
      render(`
        <section class="screen">
          <div class="panel">
            <p class="kicker">Fin del juego</p>
            <h2>Ya salieron todas las palabras</h2>
            <p class="copy" style="margin-top: 14px;">
              Se jugaron ${state.usedWordIndexes.length} palabras sin repetir.
            </p>
            <div class="actions">
              <button class="btn" type="button" data-action="reset-game">Nueva partida</button>
              <button class="btn secondary" type="button" data-action="home">Inicio</button>
            </div>
          </div>
        </section>
      `);
    }

    function revealSecret() {
      if (state.screen !== "secret" || state.revealed) return;
      state.revealed = true;
      showSecret();
    }

    function startDebateTimer() {
      updateDebateTimer();
      state.timerId = window.setInterval(() => {
        state.timerSecondsLeft = Math.max(0, state.timerSecondsLeft - 1);
        updateDebateTimer();

        if (state.timerSecondsLeft === 0) {
          clearDebateTimer();
          const copy = app.querySelector("[data-timer-copy]");
          if (copy) copy.textContent = "Tiempo terminado. Ahora toca votar o defenderse.";
        }
      }, 1000);
    }

    function clearDebateTimer() {
      if (!state.timerId) return;
      window.clearInterval(state.timerId);
      state.timerId = null;
    }

    function updateDebateTimer() {
      const timer = app.querySelector("[data-timer]");
      if (!timer) return;

      const minutes = Math.floor(state.timerSecondsLeft / 60);
      const seconds = String(state.timerSecondsLeft % 60).padStart(2, "0");
      const elapsed = DEBATE_SECONDS - state.timerSecondsLeft;
      const progress = Math.round((elapsed / DEBATE_SECONDS) * 360);

      timer.textContent = `${minutes}:${seconds}`;
      timer.style.setProperty("--progress", `${progress}deg`);
      timer.classList.toggle("done", state.timerSecondsLeft === 0);
    }

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value;
      return div.innerHTML;
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll('"', "&quot;");
    }

    app.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;

      const action = button.dataset.action;
      if (action === "setup") showSetup();
      if (action === "begin") beginRound();
      if (action === "game-over") showGameOver();
      if (action === "reset-game") resetFullGame();
      if (action === "home") showHome();
      if (action === "secret") showSecret();
      if (action === "reveal") revealSecret();
      if (action === "next") nextPlayer();
    });

    app.addEventListener("input", (event) => {
      if (!event.target.matches("[data-player-name]")) return;
      saveNamesFromForm();
    });

    app.addEventListener("touchstart", (event) => {
      if (!event.target.closest("[data-swipe-area]")) return;
      state.touchStartY = event.touches[0].clientY;
    }, { passive: true });

    app.addEventListener("touchend", (event) => {
      if (state.touchStartY === null || !event.target.closest("[data-swipe-area]")) return;
      const endY = event.changedTouches[0].clientY;
      const deltaY = state.touchStartY - endY;
      state.touchStartY = null;

      if (deltaY > 48) revealSecret();
    }, { passive: true });

    showHome();
  </script>
</body>
</html>
